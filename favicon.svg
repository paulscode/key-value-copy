<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="0" y="0" width="32" height="32">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#030806"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <!-- Leaf shape (key bow) -->
    <path d="M16 3C11 6 9 11 10 15.5C10.8 18.5 13 20 16 20C19 20 21.2 18.5 22 15.5C23 11 21 6 16 3Z"
          fill="rgba(0,255,65,0.15)" stroke="#00ff41" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Leaf center vein -->
    <line x1="16" y1="6" x2="16" y2="19" stroke="#00ff41" stroke-width="0.8" opacity="0.7"/>
    <!-- Leaf side veins -->
    <line x1="16" y1="9" x2="13" y2="7.5" stroke="#00ff41" stroke-width="0.5" opacity="0.5"/>
    <line x1="16" y1="9" x2="19" y2="7.5" stroke="#00ff41" stroke-width="0.5" opacity="0.5"/>
    <line x1="16" y1="12" x2="12.5" y2="10" stroke="#00ff41" stroke-width="0.5" opacity="0.5"/>
    <line x1="16" y1="12" x2="19.5" y2="10" stroke="#00ff41" stroke-width="0.5" opacity="0.5"/>
    <line x1="16" y1="15" x2="13" y2="13.5" stroke="#00ff41" stroke-width="0.5" opacity="0.5"/>
    <line x1="16" y1="15" x2="19" y2="13.5" stroke="#00ff41" stroke-width="0.5" opacity="0.5"/>
    <!-- Key shaft -->
    <line x1="16" y1="20" x2="16" y2="28" stroke="#00ff41" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Key teeth -->
    <line x1="16" y1="24" x2="19.5" y2="24" stroke="#00ff41" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="16" y1="27" x2="18.5" y2="27" stroke="#00ff41" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Tiny spore dots -->
  <circle cx="6" cy="8" r="0.8" fill="#00ff41" opacity="0.4"/>
  <circle cx="26" cy="5" r="0.6" fill="#00ff41" opacity="0.3"/>
  <circle cx="8" cy="25" r="0.7" fill="#39ff14" opacity="0.35"/>
  <circle cx="25" cy="22" r="0.5" fill="#00ff41" opacity="0.25"/>
</svg>
